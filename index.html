<!DOCTYPE html>
<html>
<head>
  <title>Reply Later</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FAFAF7] text-stone-900">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;

    function App() {
      const fileInputRef = useRef(null);

      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("reply-later-items");
        return saved ? JSON.parse(saved) : [];
      });

      const [input, setInput] = useState("");
      const [message, setMessage] = useState("all clear");

      useEffect(() => {
        localStorage.setItem("reply-later-items", JSON.stringify(items));
      }, [items]);

      function addItem() {
        const text = input.trim();
        if (!text) return;

        const newItem = {
          id: Date.now(),
          text,
          shown: 0
        };

        setItems(prev => [...prev, newItem]);
        setInput("");
        setMessage("saved for later");
      }

      function exportThoughts() {
        const blob = new Blob([JSON.stringify(items, null, 2)], {
          type: "application/json"
        });

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = "reply-later-backup.json";
        link.click();

        URL.revokeObjectURL(url);
        setMessage("backup downloaded");
      }

      function importThoughts(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(ev) {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) return;

            setItems(prev => [...data, ...prev]);
            setMessage("imported");
          } catch {
            setMessage("error importing");
          }
        };

        reader.readAsText(file);
      }

      return React.createElement(
        "main",
        { className: "min-h-screen flex flex-col items-center justify-center px-6 py-12" },

        // Top right utilities
        React.createElement(
          "div",
          { className: "fixed top-6 right-6 flex gap-4 text-sm text-stone-400" },

          React.createElement(
            "button",
            {
              onClick: exportThoughts,
              className: "hover:text-stone-900 transition"
            },
            "export"
          ),

          React.createElement(
            "button",
            {
              onClick: () => fileInputRef.current.click(),
              className: "hover:text-stone-900 transition"
            },
            "import"
          ),

          React.createElement("input", {
            ref: fileInputRef,
            type: "file",
            accept: "application/json",
            onChange: importThoughts,
            className: "hidden"
          })
        ),

        React.createElement(
          "section",
          { className: "w-full max-w-xl text-center" },

          React.createElement(
            "h1",
            { className: "text-4xl md:text-5xl font-semibold mb-6" },
            "Drop the thought. Stop carrying it."
          ),

          React.createElement("input", {
            value: input,
            onChange: e => setInput(e.target.value),
            onKeyDown: e => e.key === "Enter" && addItem(),
            placeholder: "what's on your mind?",
            className: "w-full rounded-full border border-stone-200 px-6 py-5 text-center text-lg outline-none shadow-sm"
          }),

          React.createElement(
            "p",
            { className: "mt-4 text-sm text-stone-400" },
            message
          )
        ),

        // Bottom right support
        React.createElement(
          "a",
          {
            href: "https://buymeacoffee.com/xcvbn",
            target: "_blank",
            className:
              "fixed bottom-6 right-6 text-sm px-4 py-2 rounded-full bg-stone-900 text-white hover:bg-stone-700 transition shadow-md"
          },
          "support the next feature"
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
