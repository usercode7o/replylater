<!DOCTYPE html>
<html>
<head>
  <title>Reply Later</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FAFAF7] text-stone-900">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;

    const surfacePrompts = [
      "this came back",
      "still on your mind?",
      "you parked this earlier",
      "worth your attention?",
      "this surfaced again"
    ];

    const doneMessages = [
      "nice. one less thing.",
      "clear.",
      "done. moving on.",
      "that’s out of your head now"
    ];

    const savedMessages = [
      "saved for later",
      "parked.",
      "you can stop carrying that",
      "got it. not now."
    ];

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function App() {
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("reply-later-items");
        return saved ? JSON.parse(saved) : [];
      });

      const [input, setInput] = useState("");
      const [current, setCurrent] = useState(null);
      const [message, setMessage] = useState("all clear");
      const [surfaceLabel, setSurfaceLabel] = useState("you parked this earlier");

      useEffect(() => {
        localStorage.setItem("reply-later-items", JSON.stringify(items));
      }, [items]);

      function addItem() {
        const text = input.trim();
        if (!text) return;

        const newItem = {
          id: Date.now(),
          text,
          shown: 0,
          createdAt: new Date().toISOString()
        };

        setItems(prev => [...prev, newItem]);
        setInput("");
        setMessage(randomFrom(savedMessages));
      }

      function surfaceNext() {
        const available = items.filter(item => item.shown < 2);

        if (available.length === 0) {
          setCurrent(null);
          setMessage("all clear");
          return;
        }

        const next = available[Math.floor(Math.random() * available.length)];
        const updatedNext = { ...next, shown: next.shown + 1 };

        setSurfaceLabel(randomFrom(surfacePrompts));

        setTimeout(() => {
          setCurrent(updatedNext);

          if (updatedNext.shown === 2) {
            setMessage("this might not come back again");
          } else {
            setMessage("one thought surfaced");
          }

          setItems(prev =>
            prev.map(item =>
              item.id === next.id ? updatedNext : item
            )
          );
        }, 400);
      }

      useEffect(() => {
        const delay = Math.random() * 20000 + 10000;

        const timer = setTimeout(() => {
          surfaceNext();
        }, delay);

        return () => clearTimeout(timer);
      }, [items]);

      function handleDone() {
        if (!current) return;

        setMessage(randomFrom(doneMessages));

        setTimeout(() => {
          setItems(prev => prev.filter(item => item.id !== current.id));
          setCurrent(null);
        }, 200);
      }

      function handleLater() {
        setCurrent(null);

        const hour = new Date().getHours();

        if (hour >= 20 || hour < 6) {
          setMessage("let it wait until tomorrow");
        } else {
          setMessage("parked again");
        }
      }

      function clearExpired() {
        setItems(prev => prev.filter(item => item.shown < 2));
        setCurrent(null);
        setMessage("cleared what didn’t come back strong");
      }

      const activeCount = items.filter(item => item.shown < 2).length;
      const expiredCount = items.filter(item => item.shown >= 2).length;

      let loadLabel = "light";
      if (activeCount >= 4 && activeCount <= 7) loadLabel = "busy";
      if (activeCount >= 8) loadLabel = "crowded";

      return React.createElement(
        "main",
        { className: "min-h-screen flex flex-col items-center justify-center px-6 py-12" },

        React.createElement(
          "section",
          { className: "w-full max-w-xl text-center" },

          React.createElement(
            "p",
            { className: "text-sm uppercase tracking-[0.25em] text-stone-400 mb-4" },
            "Reply Later"
          ),

          React.createElement(
            "h1",
            { className: "text-4xl md:text-5xl font-semibold tracking-tight mb-4" },
            "Drop the thought. Stop carrying it."
          ),

          React.createElement(
            "p",
            { className: "text-stone-500 mb-10 leading-7" },
            "Not a to-do list. A quiet place to put thoughts down and let the right ones come back."
          ),

          React.createElement("input", {
            value: input,
            onChange: e => setInput(e.target.value),
            onKeyDown: e => e.key === "Enter" && addItem(),
            placeholder: "what's on your mind?",
            className: "w-full rounded-full border border-stone-200 bg-white/80 px-6 py-5 text-center text-lg outline-none shadow-sm placeholder:text-stone-300 focus:ring-2 focus:ring-stone-200"
          }),

          React.createElement(
            "div",
            { className: "mt-6 flex items-center justify-center gap-3 text-sm text-stone-400" },
            React.createElement("span", null, `${activeCount} thing${activeCount === 1 ? "" : "s"} parked`),
            React.createElement("span", null, "•"),
            React.createElement("span", null, `mental load: ${loadLabel}`)
          ),

          React.createElement(
            "p",
            { className: "mt-4 text-sm text-stone-400 min-h-[20px]" },
            message
          ),

          activeCount > 0 &&
            React.createElement(
              "button",
              {
                onClick: surfaceNext,
                className: "mt-8 text-sm text-stone-400 hover:text-stone-900 transition"
              },
              "gently resurface one now"
            ),

          expiredCount > 0 &&
            React.createElement(
              "button",
              {
                onClick: clearExpired,
                className: "mt-4 block mx-auto text-sm text-stone-300 hover:text-stone-700 transition"
              },
              "clear faded thoughts"
            )
        ),

        current &&
          React.createElement(
            "div",
            {
              className:
                "fixed bottom-6 left-1/2 w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-3xl border border-stone-200 bg-white/95 p-6 text-center shadow-2xl transition-all"
            },

            React.createElement(
              "p",
              { className: "text-sm text-stone-400 mb-3" },
              surfaceLabel
            ),

            React.createElement(
              "h2",
              { className: "text-2xl font-medium tracking-tight mb-3" },
              current.text
            ),

            current.shown >= 2 &&
              React.createElement(
                "p",
                { className: "text-sm text-stone-400 mb-6" },
                "this might not come back again"
              ),

            current.shown < 2 &&
              React.createElement(
                "div",
                { className: "mb-6" }
              ),

            React.createElement(
              "div",
              { className: "flex gap-3" },

              React.createElement(
                "button",
                {
                  onClick: handleDone,
                  className: "flex-1 rounded-full bg-stone-900 px-5 py-3 text-white hover:bg-stone-700 transition"
                },
                "done"
              ),

              React.createElement(
                "button",
                {
                  onClick: handleLater,
                  className: "flex-1 rounded-full border border-stone-200 px-5 py-3 text-stone-600 hover:bg-stone-50 transition"
                },
                "later"
              )
            )
          )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
