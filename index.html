<!DOCTYPE html>
<html>
<head>
  <title>Reply Later</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FAFAF7] text-stone-900">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;

    const surfacePrompts = [
      "this came back",
      "still on your mind?",
      "you parked this earlier",
      "worth your attention?",
      "this surfaced again"
    ];

    const doneMessages = [
      "nice. one less thing.",
      "clear.",
      "done. moving on.",
      "that’s out of your head now"
    ];

    const savedMessages = [
      "saved for later",
      "parked.",
      "you can stop carrying that",
      "got it. not now."
    ];

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function App() {
      const fileInputRef = useRef(null);

      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("reply-later-items");
        return saved ? JSON.parse(saved) : [];
      });

      const [input, setInput] = useState("");
      const [current, setCurrent] = useState(null);
      const [message, setMessage] = useState("all clear");
      const [surfaceLabel, setSurfaceLabel] = useState("you parked this earlier");

      useEffect(() => {
        localStorage.setItem("reply-later-items", JSON.stringify(items));
      }, [items]);

      function addItem() {
        const text = input.trim();
        if (!text) return;

        const newItem = {
          id: Date.now(),
          text,
          shown: 0,
          createdAt: new Date().toISOString()
        };

        setItems(prev => [...prev, newItem]);
        setInput("");
        setMessage(randomFrom(savedMessages));
      }

      function surfaceNext() {
        const available = items.filter(item => item.shown < 2);

        if (available.length === 0) {
          setCurrent(null);
          setMessage("all clear");
          return;
        }

        const next = available[Math.floor(Math.random() * available.length)];
        const updatedNext = { ...next, shown: next.shown + 1 };

        setSurfaceLabel(randomFrom(surfacePrompts));

        setTimeout(() => {
          setCurrent(updatedNext);

          if (updatedNext.shown === 2) {
            setMessage("this might not come back again");
          } else {
            setMessage("one thought surfaced");
          }

          setItems(prev =>
            prev.map(item =>
              item.id === next.id ? updatedNext : item
            )
          );
        }, 400);
      }

      useEffect(() => {
        const delay = Math.random() * 20000 + 10000;

        const timer = setTimeout(() => {
          surfaceNext();
        }, delay);

        return () => clearTimeout(timer);
      }, [items]);

      function handleDone() {
        if (!current) return;

        setMessage(randomFrom(doneMessages));

        setTimeout(() => {
          setItems(prev => prev.filter(item => item.id !== current.id));
          setCurrent(null);
        }, 200);
      }

      function handleLater() {
        setCurrent(null);

        const hour = new Date().getHours();

        if (hour >= 20 || hour < 6) {
          setMessage("let it wait until tomorrow");
        } else {
          setMessage("parked again");
        }
      }

      function clearExpired() {
        setItems(prev => prev.filter(item => item.shown < 2));
        setCurrent(null);
        setMessage("cleared what didn’t come back strong");
      }

      function exportThoughts() {
        const data = {
          app: "Reply Later",
          exportedAt: new Date().toISOString(),
          items
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], {
          type: "application/json"
        });

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = "reply-later-backup.json";
        link.click();

        URL.revokeObjectURL(url);
        setMessage("backup downloaded");
      }

      function importThoughts(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            const importedItems = Array.isArray(data) ? data : data.items;

            if (!Array.isArray(importedItems)) {
              setMessage("couldn’t read that backup");
              return;
            }

            const cleaned = importedItems
              .filter(item => item && item.text)
              .map(item => ({
                id: item.id || Date.now() + Math.random(),
                text: item.text,
                shown: item.shown || 0,
                createdAt: item.createdAt || new Date().toISOString()
              }));

            setItems(prev => [...cleaned, ...prev]);
            setMessage(`${cleaned.length} thought${cleaned.length === 1 ? "" : "s"} restored`);
          } catch {
            setMessage("couldn’t import that file");
          }
        };

        reader.readAsText(file);
        event.target.value = "";
      }

      const activeCount = items.filter(item => item.shown < 2).length;
      const expiredCount = items.filter(item => item.shown >= 2).length;

      let loadLabel = "light";
      if (activeCount >= 4 && activeCount <= 7) loadLabel = "busy";
      if (activeCount >= 8) loadLabel = "crowded";

      return React.createElement(
        "main",
        { className: "min-h-screen flex flex-col items-center justify-center px-6 py-12" },

        React.createElement(
          "section",
          { className: "w-full max-w-xl text-center" },

          React.createElement("p", { className: "text-sm uppercase tracking-[0.25em] text-stone-400 mb-4" }, "Reply Later"),

          React.createElement("h1", { className: "text-4xl md:text-5xl font-semibold mb-4" }, "Drop the thought. Stop carrying it."),

          React.createElement("input", {
            value: input,
            onChange: e => setInput(e.target.value),
            onKeyDown: e => e.key === "Enter" && addItem(),
            placeholder: "what's on your mind?",
            className: "w-full rounded-full border px-6 py-5 text-center"
          }),

          React.createElement("p", { className: "mt-4 text-sm text-stone-400" }, message),

          React.createElement("div", { className: "mt-6 flex gap-4 justify-center" },

            React.createElement("button", { onClick: exportThoughts }, "export"),

            React.createElement("button", {
              onClick: () => fileInputRef.current.click()
            }, "import")
          ),

          React.createElement("input", {
            ref: fileInputRef,
            type: "file",
            accept: "application/json",
            onChange: importThoughts,
            className: "hidden"
          }),

          React.createElement("a", {
            href: "https://buymeacoffee.com/xcvbn",
            target: "_blank",
            className: "mt-10 inline-block bg-black text-white px-6 py-3 rounded-full"
          }, "support the next feature")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
